name: Response Shard Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  response-shard-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check ResponseShard presence
        run: |
          # Check if any Rust/ALN/CSV changes have corresponding ResponseShard rows
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          
          RUST_ALN_CHANGED=false
          for file in $CHANGED_FILES; do
            case "$file" in
              crates/*.rs|schemas/*.aln|*.csv)
                RUST_ALN_CHANGED=true
                break
                ;;
            esac
          done

          if [ "$RUST_ALN_CHANGED" = true ]; then
            # Check for new ResponseShard rows in shards/response/
            if [ ! -d "shards/response" ]; then
              echo "::warning::No shards/response/ directory found. Consider adding ResponseShard rows for code changes."
            else
              NEW_SHARDS=$(find shards/response -name "*.csv" -mmin -60 2>/dev/null | wc -l)
              if [ "$NEW_SHARDS" -eq 0 ]; then
                echo "::warning::No new ResponseShard rows detected in the last hour."
              else
                echo "Found $NEW_SHARDS new ResponseShard files."
              fi
            fi
          fi

      - name: Validate KER thresholds (simulation)
        run: |
          # This would normally parse CSV shards and validate K>=0.90, E>=0.90, R<=0.13
          # For now, just check that the validation infrastructure exists
          if [ -f "crates/response_shard_core/src/lib.rs" ]; then
            echo "ResponseShard validation infrastructure present."
          else
            echo "::error::Missing response_shard_core crate!"
            exit 1
          fi

  build-scheduler-check:
    runs-on: ubuntu-latest
    needs: response-shard-check

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Test build_scheduler crate
        run: cargo test -p build_scheduler

      - name: Test storage_shards crate
        run: cargo test -p storage_shards

  oss-vfs-check:
    runs-on: ubuntu-latest
    needs: response-shard-check

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Test oss_vfs crate
        run: cargo test -p oss_vfs

      - name: Test agent_interface crate
        run: cargo test -p agent_interface
